services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: seocrawler-clickhouse
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-18123}:8123"   # HTTP interface
      - "${CLICKHOUSE_PORT:-19000}:9000"         # Native protocol
    volumes:
      - seocrawler_clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  seocrawler_clickhouse_data:
