services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: crawlobserver-clickhouse
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-18123}:8123"   # HTTP interface
      - "${CLICKHOUSE_PORT:-19000}:9000"         # Native protocol
    volumes:
      - crawlobserver_clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  # This named volume lives inside Docker Desktop's virtual disk (60GB by default).
  # Large crawls can fill it up. Increase via Docker Desktop > Settings > Resources > Disk.
  crawlobserver_clickhouse_data:
    # Use existing volume from before the rename. Remove this block for fresh installs.
    name: seocrawler_seocrawler_clickhouse_data
    external: true
