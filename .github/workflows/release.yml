name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: ubuntu-latest
            goos: darwin
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: windows-latest
            goos: windows
            goarch: amd64
            suffix: .exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Copy frontend dist
        shell: bash
        run: mkdir -p internal/server/frontend && cp -r frontend/dist internal/server/frontend/dist

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags "-X github.com/SEObserver/crawlobserver/internal/updater.Version=${{ github.ref_name }}" -o "crawlobserver-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix || '' }}" ./cmd/crawlobserver

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: crawlobserver-${{ matrix.goos }}-${{ matrix.goarch }}
          path: crawlobserver-${{ matrix.goos }}-${{ matrix.goarch }}*

  desktop:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Copy frontend dist
        run: mkdir -p internal/server/frontend && cp -r frontend/dist internal/server/frontend/dist

      - name: Build desktop binary
        run: |
          GOARCH=arm64 CGO_ENABLED=1 go build -tags desktop \
            -ldflags "-X github.com/SEObserver/crawlobserver/internal/updater.Version=${{ github.ref_name }}" \
            -o CrawlObserver ./cmd/crawlobserver

      - name: Create .app bundle
        run: |
          BUNDLE="CrawlObserver.app"
          mkdir -p "${BUNDLE}/Contents/MacOS" "${BUNDLE}/Contents/Resources"
          cp build/darwin/Info.plist "${BUNDLE}/Contents/Info.plist"
          cp CrawlObserver "${BUNDLE}/Contents/MacOS/CrawlObserver"
          chmod +x "${BUNDLE}/Contents/MacOS/CrawlObserver"
          cp build/darwin/iconfile.icns "${BUNDLE}/Contents/Resources/iconfile.icns"

      - name: Import code signing certificate
        if: env.APPLE_CERTIFICATE_P12 != ''
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > certificate.p12
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          rm certificate.p12

      - name: Code sign the app
        if: env.APPLE_CERTIFICATE_P12 != ''
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
        run: |
          codesign --force --options runtime --deep \
            --entitlements build/darwin/entitlements.plist \
            --sign "Developer ID Application: Kevin Richard (48HGS54WHP)" \
            CrawlObserver.app
          codesign --verify --deep --strict CrawlObserver.app

      - name: Create DMG
        run: |
          mkdir -p dmg_staging
          cp -R CrawlObserver.app dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create -volname "CrawlObserver" -srcfolder dmg_staging \
            -ov -format UDZO "CrawlObserver-darwin-arm64.dmg"

      - name: Sign DMG
        if: env.APPLE_CERTIFICATE_P12 != ''
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
        run: |
          codesign --force --sign "Developer ID Application: Kevin Richard (48HGS54WHP)" \
            "CrawlObserver-darwin-arm64.dmg"

      - name: Notarize DMG
        if: env.APPLE_CERTIFICATE_P12 != ''
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool submit "CrawlObserver-darwin-arm64.dmg" \
            --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD" --wait
          xcrun stapler staple "CrawlObserver-darwin-arm64.dmg"

      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          [ -f "$KEYCHAIN_PATH" ] && security delete-keychain "$KEYCHAIN_PATH" || true

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CrawlObserver-darwin-arm64
          path: CrawlObserver-darwin-arm64.dmg

  release:
    needs: [build, desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release and upload assets
        run: |
          gh release create "${{ github.ref_name }}" artifacts/* \
            --title "${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
