name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Copy frontend dist
        run: mkdir -p internal/server/frontend && cp -r frontend/dist internal/server/frontend/dist

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Build
        run: go build ./cmd/crawlobserver

      - name: Test
        run: go test ./... -v -race -coverprofile=coverage.out

      - name: Coverage
        run: |
          go tool cover -func=coverage.out
          TOTAL=$(go tool cover -func=coverage.out | grep ^total: | awk '{print $NF}' | tr -d '%')
          echo "Total coverage: ${TOTAL}%"
          THRESHOLD=25
          if [ "$(echo "$TOTAL < $THRESHOLD" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${TOTAL}% is below threshold ${THRESHOLD}%"
            exit 1
          fi

  integration:
    runs-on: ubuntu-latest
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:latest
        ports:
          - 19000:9000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Copy frontend dist
        run: mkdir -p internal/server/frontend && cp -r frontend/dist internal/server/frontend/dist

      - name: Integration tests
        run: go test -tags integration -race -v -timeout 120s ./e2e/...
        env:
          CH_HOST: localhost
          CH_PORT: 19000

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Frontend tests
        run: cd frontend && npm ci && npm test

      - name: Lint & format check
        run: cd frontend && npm run lint && npm run format:check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Copy frontend dist
        run: mkdir -p internal/server/frontend && cp -r frontend/dist internal/server/frontend/dist

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
